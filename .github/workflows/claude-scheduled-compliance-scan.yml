name: Claude Scheduled Compliance Scan

# Step 1: Listen for @claude mentions in issues and comments,
# or run manually from the Actions UI for on-demand compliance checks
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

jobs:
  claude-compliance-scan:
    # Step 2: Only run when @claude is mentioned, or when manually dispatched
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))

    # Step 3: Spin up a fresh Linux VM
    runs-on: ubuntu-latest

    # Step 4: Read-only repo access; write to issues so Claude can open a tracked
    # finding for Critical/High severity results — gives auditors a traceable CAPA record
    permissions:
      contents: read
      pull-requests: read
      issues: write
      id-token: write

    steps:
      # Step 5: Full checkout — the scan reviews the whole codebase, not just a diff
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 6: Run Claude against the full repository with a compliance-focused prompt
      # Scope is explicit so the Actions log serves as a documented review record
      # covering HIPAA, TGA/MDR, ISO 13485, and FDA 21 CFR Part 820 obligations
      - name: Run Claude Compliance Scan
        id: claude-compliance-scan
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Perform a compliance-focused review of the full OrthoCloud codebase at ${{ github.repository }}.
            This is a HIPAA-regulated, TGA/MDR-scoped medical imaging SaaS (Software as a Medical Device).
            Check for and report on:
            1. PHI exposure risks — any code path where DICOM metadata, patient identifiers, or scan data
               could be logged, persisted unencrypted, or leaked in error responses
            2. Audit trail gaps — FastAPI endpoints that perform clinical operations (upload, segment, retrieve)
               without generating an auditable log entry (required by HIPAA and 21 CFR Part 11)
            3. Input validation coverage — ensure all endpoints that accept DICOM data validate file type,
               size limits, and structure before passing to SimpleITK or TotalSegmentator
            4. Error handling completeness — bare except blocks or unhandled exceptions in the segmentation
               pipeline that could produce a silent failure and return a success status to a clinician
            5. Dependency risk — flag any dependencies pinned to versions with known CVEs,
               or that are unpinned (floating versions in requirements files)
            6. Configuration and secrets hygiene — hardcoded values, missing environment variable validation,
               or config that should be injected at runtime but is baked into source
            Summarise findings by severity (Critical / High / Medium / Low).
            If any Critical or High findings are present, open a GitHub issue titled "Compliance Scan — [today's date]".
            If the scan is clean, post a summary comment confirming the scan ran and the scope checked.
