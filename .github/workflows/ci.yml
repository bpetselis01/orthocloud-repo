name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint with ruff
        run: ruff check backend/

      - name: Run tests
        run: pytest tests/
        env:
          PYTHONPATH: backend
