name: Claude Code Review

# Step 1: Listen for @claude mentions in PR comments and reviews
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    # Step 2: Only run when "@claude review" is mentioned specifically
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude review')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude review'))

    # Step 3: Spin up a fresh Linux VM
    runs-on: ubuntu-latest

    # Step 4: Grant read-only access to the repo, PRs, and issues
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      # Step 5: Download the repo code onto the VM
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 6: Run Claude's code review skill on the PR
      # PR number comes from the issue number — GitHub treats PR comments as issue comments
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.issue.number }}'
