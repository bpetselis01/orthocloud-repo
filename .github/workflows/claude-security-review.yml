name: Claude Security Review

# Step 1: Listen for @claude mentions in PR comments and reviews
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-security-review:
    # Step 2: Only run when "@claude security" is mentioned specifically
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude security')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude security')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude security'))

    # Step 3: Spin up a fresh Linux VM
    runs-on: ubuntu-latest

    # Step 4: Read-only repo access; write to PRs so Claude can post findings as a review comment
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      # Step 5: Fetch the repo including the PR diff
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Step 6: Run a focused security review against the PR diff
      # PR number comes from the issue number — GitHub treats PR comments as issue comments
      - name: Run Claude Security Review
        id: claude-security-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            /security-review Review the changes in pull request ${{ github.repository }}/pull/${{ github.event.issue.number }} with a focus on:
            1. PHI/PII exposure — any logging, printing, or persisting of DICOM metadata or patient identifiers
            2. Path traversal and zip-bomb risks in DICOM ZIP upload handling (FastAPI multipart endpoints)
            3. Insecure temporary file and directory creation (TotalSegmentator and SimpleITK write to temp dirs)
            4. Hardcoded secrets, credentials, or environment variable misuse
            5. Missing authentication or authorisation checks on API endpoints
            6. Dependency additions that introduce known CVEs
            Post findings as a PR review comment. If no issues are found, explicitly confirm the review was completed and state the scope checked.
